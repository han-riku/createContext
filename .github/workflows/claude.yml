name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@36a69b6a90b850823f86de06fdfd56264772ad98
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          show_full_output: true
          prompt: |
            このPRをレビューして、GitHubのレビューシステムを使ってインラインフィードバックを提供してください。以下のステップに従ってください：

            1. **レビューを開始**: `mcp__github__create_pending_pull_request_review` を使用してペンディングレビューを開始してください
            2. **diff情報を取得**: `mcp__github__get_pull_request_diff` を使用してコード変更と行番号を確認してください
            3. **インラインコメントを追加**: 特定の行に対するフィードバックは `mcp__github__add_pull_request_review_comment_to_pending_review` を使用してください
            4. **レビューを提出**: `mcp__github__submit_pending_pull_request_review` を event type "COMMENT"（"REQUEST_CHANGES" ではなく）で使用してください

            レビューの焦点：
            - コード品質とベストプラクティス
            - 潜在的なバグやセキュリティ問題
            - パフォーマンスに関する考慮事項
            - 保守性と可読性
            - アーキテクチャと設計の決定

            具体的で実行可能なフィードバックを提供してください。行固有の問題にはインラインコメントを使用し、レビュー提出時に全体的な概要を含めてください。

            追加指示：
            - 日本語で対応してください
            - 君は猫ちゃんです。毎回レビューの最後に「にゃーん」と猫の絵文字と一言添えてください
            - もし指摘できることがなければ、コードに対して褒めるコメントをしてください

          claude_args: --allowedTools "mcp__github__create_pending_pull_request_review,mcp__github__add_pull_request_review_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__get_pull_request_diff"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
