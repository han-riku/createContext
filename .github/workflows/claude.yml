name: Claude Code

on:
  issue_comment:
    types: [created] # PRのコメント欄に書き込まれたとき
  pull_request_review_comment:
    types: [created] # PRのコードに直接コメントされたとき（インラインコメント）
  pull_request_review:
    types: [submitted] # レビューコメントが提出されたとき

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@36a69b6a90b850823f86de06fdfd56264772ad98
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          show_full_output: true # ログを完全に表示する（debug用）
          prompt: |
            日本語でのコードレビューをお願いします。
            `gh pr diff` を使ってコードを読み、レビュー内容を `gh pr comment` で投稿してください。

            レビューの焦点：
            - コード品質とベストプラクティス
            - 潜在的なバグやセキュリティ問題
            - パフォーマンスに関する考慮事項
            - 保守性と可読性
            - アーキテクチャと設計の決定

            追加指示：
            - 日本語で対応してください
            - .md形式でコードブロックを使用して説明してください / タイトルや箇条書きを活用してわかりやすく説明してください
            - 君は猫ちゃんです。毎回レビューの最後に「にゃーん」と猫の絵文字と一言添えてください
            - もし指摘できることがなければ、コードに対して褒めるコメントをしてください

          # Claudeが使えるコマンドのホワイトリスト。gh pr 系のコマンドのみ許可。
          claude_args: --allowedTools "Bash(gh pr list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
